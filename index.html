<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>KCNX OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body { margin:0; overflow:hidden; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:black; color:white; user-select: none; }

/* Boot Screen */
#boot {
  position:fixed;width:100%;height:100%;background:black;
  display:flex;justify-content:center;align-items:center;flex-direction:column;
  transition:opacity 2s; z-index: 99999;
}
#logo { font-size:60px;letter-spacing:8px;opacity:0;transition:2s; font-weight: 300;}
#sub {opacity:0;margin-top:10px;transition:2s;color:#888;font-size:14px;}

/* Topbar */
#topbar {
  display: none;
  position:fixed;
  top:0;
  width:100%;
  height:30px;
  background:rgba(10, 10, 15, 0.8);
  backdrop-filter: blur(10px);
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
  font-size:13px;
  z-index: 9999;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  box-sizing: border-box;
}

/* Network & Status Indicators */
.status-group { display: flex; align-items: center; gap: 12px; }
.bar{display:inline-block;width:3px;margin:1px;background:white}
.b1{height:5px}.b2{height:8px}.b3{height:11px}.b4{height:14px}
#battery{width:22px;height:11px;border:1px solid rgba(255,255,255,0.7);border-radius:2px;padding:1px;display:flex;}
#level{height:100%;background:#00ffcc;width:100%;transition: width 0.5s, background 0.5s;}

/* Desktop Layout */
#desktop {
  display:none;width:100vw;height:100vh;
  background: radial-gradient(circle at center, #1b1b2f 0%, #0a0a0f 100%);
  padding:50px 20px 20px 20px;
  display:flex; flex-direction: row; flex-wrap:wrap; align-content: flex-start; justify-content: flex-start;
  gap: 20px;
  box-sizing: border-box;
  z-index: 1;
}

/* System Desktop Icons */
.icon {
  width:85px; padding:10px 5px; text-align:center; cursor:pointer; border-radius: 8px;
  transition: background 0.2s, transform 0.1s;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.icon:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-2px); }
.icon:active { transform: translateY(0); background: rgba(255, 255, 255, 0.15); }
.icon-img { font-size: 32px; filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.3)); }
.icon span { display:block; font-size:12px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); color: #e0e0e0; font-weight: 500;}

/* Main OS Window Sandbox */
.window {
  position:absolute; top:40px; left:20px; width:calc(100% - 40px); height:calc(100% - 60px);
  background:#121214; z-index: 1000; border-radius: 12px; overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid rgba(255, 255, 255, 0.08);
  display: flex; flex-direction: column;
}

/* Window Titlebar */
.titlebar {
  background:#1a1a1e; padding:12px 16px;
  display:flex; justify-content:space-between; align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.title-text { font-size: 13px; font-weight: 600; letter-spacing: 0.5px; color: #00ffcc; text-transform: uppercase; }
.close-btn { 
  cursor: pointer; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; background: rgba(255,255,255,0.05); font-size: 10px; transition: background 0.2s;
}
.close-btn:hover { background: #ff4a4a; color: white; }

/* Inner App Viewport */
.content { flex: 1; overflow:auto; position: relative; background: #121214; }

/* Modern Browser Interface GUI Design */
.browser-container { display: flex; flex-direction: column; height: 100%; width: 100%; background: #18181c; }
.browser-tabs { display: flex; background: #101012; padding: 6px 10px 0 10px; gap: 4px; border-bottom: 1px solid #26262b; }
.browser-tab { 
  background: #1a1a1e; color: #8c8c96; padding: 8px 16px; font-size: 12px; border-radius: 8px 8px 0 0;
  display: flex; align-items: center; gap: 8px; min-width: 140px; max-width: 200px; border: 1px solid transparent; border-bottom: none;
}
.browser-tab.active { background: #1c1c21; color: #fff; font-weight: 500; border-color: #26262b; position: relative; }

.browser-toolbar { 
  display: flex; align-items: center; padding: 8px 12px; background: #1c1c21; 
  gap: 12px; border-bottom: 1px solid #26262b;
}
.browser-nav-btn {
  background: none; border: none; color: #aaa; font-size: 15px; cursor: pointer;
  width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.browser-nav-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }

.browser-address-frame { flex: 1; position: relative; display: flex; align-items: center; }
.browser-address-bar { 
  width: 100%; background: #101012; border: 1px solid #2e2e36; color: #e0e0e0;
  padding: 7px 15px 7px 35px; font-size: 13px; border-radius: 20px; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.browser-address-bar:focus { border-color: #00ffcc; box-shadow: 0 0 0 2px rgba(0,255,204,0.15); }
.address-icon { position: absolute; left: 12px; color: #666; font-size: 13px; }

.browser-bookmarks { display: flex; gap: 15px; padding: 4px 14px; background: #18181c; border-bottom: 1px solid #26262b; font-size: 11px; color: #aaa; }
.bookmark-item { cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 4px; }
.bookmark-item:hover { background: rgba(255,255,255,0.05); color: #00ffcc; }

.browser-viewport { flex: 1; background: #101012; position: relative; }
.browser-iframe { width: 100%; height: 100%; border: none; background: white; display: none; }

.browser-home-screen {
  position: absolute; top:0; left:0; width:100%; height:100%; background: #141419;
  display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; overflow-y: auto;
}
.browser-search-logo { font-size: 36px; font-weight: 300; margin-bottom: 20px; color: #fff; letter-spacing: 2px; }
.browser-search-logo span { color: #00ffcc; font-weight: 700; }
.browser-app-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 100px)); gap: 20px; justify-content: center; width: 100%; max-width: 500px; margin-top: 15px;}
.browser-app-card {
  background: #1c1c24; border: 1px solid #2c2c38; border-radius: 10px; padding: 15px 10px;
  display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; transition: all 0.2s;
}
.browser-app-card:hover { transform: translateY(-4px); border-color: #00ffcc; background: #22222c; }
.browser-app-card .app-logo { font-size: 28px; }
.browser-app-card span { font-size: 11px; color: #ccc; font-weight: 500; text-align: center;}

/* Calculator Layout */
.calc { max-width: 280px; margin: 20px auto; padding: 15px; background: #1a1a24; border-radius: 12px; border: 1px solid #2c2c38; }
.calc button { width: 22%; height: 45px; margin: 3px; font-size: 15px; border-radius: 6px; border: none; background: #252533; color: white; cursor: pointer; transition: background 0.1s; }
.calc button:hover { background: #323247; }
.calc button.op-btn { background: #2d3748; color: #00ffcc; }
.calc button.eq-btn { background: #00ffcc; color: #121214; font-weight: bold; }
.calc button.eq-btn:hover { background: #00e6b8; }
.calc input { width: 96%; height: 45px; font-size: 20px; margin-bottom: 12px; background: #0f0f15; border: 1px solid #2c2c38; color: white; text-align: right; padding-right: 10px; border-radius: 6px; outline: none; }
</style>
</head>

<body>

<div id="boot">
  <div id="logo">KCNX</div>
  <div id="sub">Kedlestone Cartes Normal Xenodocial</div>
</div>

<div id="topbar">
  <div class="status-group">
    <div>
      <span class="bar b1"></span>
      <span class="bar b2"></span>
      <span class="bar b3"></span>
      <span class="bar b4"></span> <span style="font-weight:600;">4G</span>
    </div>
  </div>

  <div id="time" style="font-weight: 500; letter-spacing: 0.5px;">--:--</div>

  <div class="status-group">
    <div id="battery"><div id="level"></div></div>
  </div>
</div>

<div id="desktop">
  <div class="icon" onclick="window.open('https://bhargav5730.github.io/ASTRONYX-data.html/', '_blank')">
    <div class="icon-img">📝</div><span>Notepad</span>
  </div>
  
  <div class="icon" onclick="openApp('calc')">
    <div class="icon-img">🧮</div><span>Calculator</span>
  </div>
  
  <div class="icon" onclick="openApp('browser')">
    <div class="icon-img">🌐</div><span>Browser</span>
  </div>
  
  <div class="icon" onclick="openApp('recycle')">
    <div class="icon-img">🗑️</div><span>Recycle</span>
  </div>
  
  <div class="icon" onclick="window.open('https://poki.com', '_blank')">
    <div class="icon-img">🛒</div><span>Store</span>
  </div>
  
  <div class="icon" onclick="window.open('https://bhargav5730.github.io/kcnxPLAYER/', '_blank')">
    <div class="icon-img">🎵</div><span>Music Player</span>
  </div>
</div>

<audio id="audio" src="https://files.catbox.moe/qmismt.mp3"></audio>

<script>
/* System Configuration & Variables */
const boot = document.getElementById('boot');
const logo = document.getElementById('logo');
const sub = document.getElementById('sub');
const desktop = document.getElementById('desktop');
const topbar = document.getElementById('topbar');
const time = document.getElementById('time');
const level = document.getElementById('level');
const audio = document.getElementById('audio');

setTimeout(()=>{logo.style.opacity=1;sub.style.opacity=1},1000);
setTimeout(()=>boot.style.opacity=0,3500);
setTimeout(()=>{
  boot.style.display="none";
  desktop.style.display="flex";
  topbar.style.display="flex";   
  audio.currentTime=15;
  audio.play().catch(()=>{});
},4500);

/* Realtime Clock */
setInterval(()=>{
  let d=new Date();
  time.innerText=d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
},1000);

/* Battery Simulation */
let lvl=100;
setInterval(()=>{
  lvl--; if(lvl<0) lvl=100;
  level.style.width=lvl+"%";
  if(lvl>50) level.style.background="#00ffcc";
  else if(lvl>20) level.style.background="#ffbb00";
  else level.style.background="#ff4a4a";
},5000);

/* Application Window Manager Engine */
function openApp(app){
  let win=document.createElement("div");
  win.className="window";

  let bar=document.createElement("div");
  bar.className="titlebar";
  bar.innerHTML=`<div class='title-text'>${app}</div> <span class='close-btn' onclick='this.parentElement.parentElement.remove()'>✕</span>`;

  let content=document.createElement("div");
  content.className="content";

  if(app=="calc"){
    content.innerHTML=`
      <div class="calc">
        <input id="display" readonly><br>
        <button class="op-btn" onclick="clearAll()">AC</button>
        <button class="op-btn" onclick="del()">DEL</button>
        <button class="op-btn" onclick="add('(')">(</button>
        <button class="op-btn" onclick="add(')')">)</button><br>
        <button onclick="add('7')">7</button>
        <button onclick="add('8')">8</button>
        <button onclick="add('9')">9</button>
        <button class="op-btn" onclick="add('/')">÷</button><br>
        <button onclick="add('4')">4</button>
        <button onclick="add('5')">5</button>
        <button onclick="add('6')">6</button>
        <button class="op-btn" onclick="add('*')">×</button><br>
        <button onclick="add('1')">1</button>
        <button onclick="add('2')">2</button>
        <button onclick="add('3')">3</button>
        <button class="op-btn" onclick="add('-')">−</button><br>
        <button onclick="add('0')">0</button>
        <button onclick="add('.')">.</button>
        <button class="eq-btn" onclick="calculate()">=</button>
        <button class="op-btn" onclick="add('+')">+</button><br>
        <button class="op-btn" onclick="add('Math.sqrt(')">√</button>
        <button class="op-btn" onclick="add('Math.sin(')">sin</button>
        <button class="op-btn" onclick="add('Math.cos(')">cos</button>
        <button class="op-btn" onclick="add('Math.tan(')">tan</button>
      </div>`;
  }
  else if(app=="browser"){
    content.innerHTML = `
      <div class="browser-container">
        <div class="browser-tabs">
          <div class="browser-tab active">
            <span>🌐 New Tab</span>
          </div>
        </div>
        
        <div class="browser-toolbar">
          <button class="browser-nav-btn" onclick="browserHome(this)" title="Home">🏠</button>
          <button class="browser-nav-btn" title="Back">◀</button>
          <button class="browser-nav-btn" title="Forward">▶</button>
          <button class="browser-nav-btn" onclick="browserRefresh(this)" title="Refresh">🔄</button>
          
          <div class="browser-address-frame">
            <span class="address-icon">🔍</span>
            <input class="browser-address-bar" type="text" placeholder="Type wiki/maps to load inside, or search to open a new tab..." onkeydown="if(event.key==='Enter') browserRouteEngine(this)">
          </div>
        </div>

        <div class="browser-bookmarks">
          <div class="bookmark-item" onclick="browserHandleClick(this, 'https://en.m.wikipedia.org')">📚 Wikipedia</div>
          <div class="bookmark-item" onclick="browserHandleClick(this, 'https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d14115.115857217316!2d94.478!3d27.483!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sin!4v1700000000000')">🗺️ Google Maps</div>
          <div class="bookmark-item" onclick="browserHandleClick(this, 'https://bing.com')">🔍 Bing Search</div>
        </div>
        
        <div class="browser-viewport">
          <div class="browser-home-screen">
            <div class="browser-search-logo">KCNX<span>Navigator</span></div>

            <div class="browser-app-grid">
              <div class="browser-app-card" onclick="browserHandleClick(this, 'https://en.m.wikipedia.org')">
                <div class="app-logo">🌐</div><span>Wikipedia</span>
              </div>
              <div class="browser-app-card" onclick="browserHandleClick(this, 'https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d14115.115857217316!2d94.478!3d27.483!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sin!4v1700000000000')">🗺️ Maps Embed</div>
              <div class="browser-app-card" onclick="browserHandleClick(this, 'https://bing.com')">
                <div class="app-logo">🔍</div><span>Bing Engine</span>
              </div>
              <div class="browser-app-card" onclick="browserHandleClick(this, 'https://google.com')">
                <div class="app-logo">✨</div><span>Google</span>
              </div>
            </div>
          </div>
          <iframe class="browser-iframe"></iframe>
        </div>
      </div>`;
  }
  else if(app=="recycle"){
    content.innerHTML="<div style='padding:20px;'><h3>Recycle Bin</h3><p style='color:#666;'>Empty 🗑️</p></div>";
  }

  win.appendChild(bar);
  win.appendChild(content);
  document.body.appendChild(win);
}

/* SMART ROUTING AND CONDITIONAL IFRAME ENGINE */
function browserRouteEngine(inputElement) {
  let query = inputElement.value.trim().toLowerCase();
  if(!query) return;
  
  let targetContainer = inputElement.closest('.browser-container');
  
  // Exception Check 1: Wikipedia
  if (query.includes("wikipedia")) {
    loadInIframe(targetContainer, "https://en.m.wikipedia.org");
    return;
  }
  // Exception Check 2: Google Maps
  if (query.includes("maps") || query.includes("map")) {
    loadInIframe(targetContainer, "https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d14115.115857217316!2d94.478!3d27.483!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sin!4v1700000000000");
    return;
  }

  // Default: Open everything else in a completely new window/tab
  let destinationUrl = "";
  if (query.includes('.') && !query.includes(' ')) {
    destinationUrl = (query.startsWith("http://") || query.startsWith("https://")) ? query : "https://" + query;
  } else {
    destinationUrl = "https://www.google.com/search?q=" + encodeURIComponent(query);
  }
  window.open(destinationUrl, '_blank');
  inputElement.value = "";
}

function browserHandleClick(element, targetUrl) {
  let targetContainer = element.closest('.browser-container');
  
  // Handle the exceptions inside iframe
  if (targetUrl.includes("wikipedia") || targetUrl.includes("maps")) {
    loadInIframe(targetContainer, targetUrl);
  } else {
    // Open standard websites externally
    window.open(targetUrl, '_blank');
  }
}

function loadInIframe(container, cleanUrl) {
  let addressBar = container.querySelector('.browser-address-bar');
  let homeScreen = container.querySelector('.browser-home-screen');
  let iframe = container.querySelector('.browser-iframe');
  let tabTitle = container.querySelector('.browser-tab span');
  
  addressBar.value = cleanUrl;
  tabTitle.innerText = cleanUrl.includes("wikipedia") ? "Wikipedia" : "Google Maps";
  
  homeScreen.style.display = "none";
  iframe.style.display = "block";
  iframe.src = cleanUrl;
}

function browserHome(btnElement) {
  let container = btnElement.closest('.browser-container');
  let addressBar = container.querySelector('.browser-address-bar');
  let homeScreen = container.querySelector('.browser-home-screen');
  let iframe = container.querySelector('.browser-iframe');
  let tabTitle = container.querySelector('.browser-tab span');
  
  if(addressBar) addressBar.value = "";
  tabTitle.innerText = "🌐 New Tab";
  iframe.src = "";
  iframe.style.display = "none";
  homeScreen.style.display = "flex";
}

function browserRefresh(btnElement) {
  let container = btnElement.closest('.browser-container');
  let iframe = container.querySelector('.browser-iframe');
  if(iframe && iframe.style.display !== "none" && iframe.src) {
    let currentSrc = iframe.src;
    iframe.src = '';
    iframe.src = currentSrc;
  }
}

/* Calculator Logic */
function add(v){document.getElementById('display').value+=v;}
function clearAll(){document.getElementById('display').value="";}
function del(){document.getElementById('display').value=document.getElementById('display').value.slice(0,-1);}
function calculate(){
  try {
    let rawInput = document.getElementById('display').value;
    if(!rawInput) return;
    document.getElementById('display').value=eval(rawInput);
  } catch(e) {
    alert("Syntax Calculation Error");
  }
}
</script>

</body>
                                                                      </html>
